# kalibr_ros2 camera intrinsics calibration config for OAK-FFC-3P IMX577 (RGB camera)
#
# Used by: ros2 run kalibr2_ros kalibr_calibrate_cameras
#
# This calibrates the camera INTRINSICS ONLY (focal length, principal point, distortion).
# The IMU-to-camera extrinsics are calibrated separately with kalibr_calibrate_imu_camera.
#
# INPUT BAG: recorded with oak_ffc_3p_rgb_calibration.yaml (10 FPS, 1920x1080)
#
board:
  target_type: 'aprilgrid'
  tagCols: 6
  tagRows: 6
  tagSize: 0.045        # metres — must match kalibr_aprilgrid.yaml
  tagSpacing: 0.3       # gap/tagSize ratio — must match kalibr_aprilgrid.yaml

cameras:
  rgb_imx577:
    # pinhole-radtan: pinhole projection + radial-tangential (Brown-Conrady) distortion.
    # The IMX577 on the M12 HQ113 lens is a CORRECTED wide-angle lens with <1.5% distortion.
    # Corrected wide-angle lenses behave like rectilinear projections and are modelled with
    # radtan. pinhole-equi (Kannala-Brandt) is for fisheye lenses with 20-50%+ distortion;
    # using it here causes the optimizer to diverge (confirmed: ~485 px RMSE).
    model: 'pinhole-radtan'

    # Initial focal length guess in pixels at 1920px width for 100° HFOV rectilinear lens:
    #   fx = image_width / (2 × tan(HFOV / 2))
    #      = 1920 / (2 × tan(50°))
    #      = 1920 / (2 × 1.1918)
    #      ≈ 806 px
    focal_length_fallback: 806.0

    source:
      # Path to the recorded ROS2 bag (MCAP format)
      # Update this path to wherever you saved the calibration recording
      rosbag_path: '/media/logic/USamsung/ros2_ws/calibration_bags/rgb_imu_calibration/rgb_imu_calibration_0.mcap'
      topic: '/oak/rgb/image_raw'
